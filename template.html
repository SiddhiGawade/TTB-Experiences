<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations for [DESTINATION_NAME]</title>
    <!-- Link to the central styles.css -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Floating Action Buttons -->
    <div class="btn-container">
        <button class="action-btn" onclick="printPDF()">Save as PDF</button>
    </div>

    <!-- Desktop Navigation Arrows -->
    <button class="nav-btn nav-prev" onclick="scrollBook(-1)" aria-label="Previous Page">&#10094;</button>
    <button class="nav-btn nav-next" onclick="scrollBook(1)" aria-label="Next Page">&#10095;</button>

    <!-- Main Book Container -->
    <div class="book-container" id="bookContainer">
        
        <!-- Page 1: Cover Page -->
        <div class="page-base cover-page">
            <h1 class="cover-title">[DESTINATION_NAME]</h1>
            <p class="cover-subtitle">Essential tips for a safe, comfortable & memorable journey.</p>
        </div>

        <!-- Hidden Injected Content -->
        <div id="injectedContent" style="display: none;">
            <!-- CONTENT_GOES_HERE -->
        </div>

    </div>

    <!-- Script to automatically paginate the generated markdown based on height -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const injected = document.getElementById("injectedContent");
            const container = document.getElementById("bookContainer");
            
            // 1. Gather all nodes to process (unpack sections if present)
            let elements = [];
            const children = Array.from(injected.childNodes);
            for (let i = 0; i < children.length; i++) {
                const node = children[i];
                if (node.nodeName.toUpperCase() === 'SECTION') {
                    Array.from(node.childNodes).forEach(child => elements.push(child));
                } else {
                    elements.push(node);
                }
            }
            
            // Filter out empty text nodes
            elements = elements.filter(node => !(node.nodeType === 3 && node.textContent.trim() === ''));

            // 2. The A4 template for an inner page
            function createNewPage(pageNum) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page-base book-page';
                
                // Format page number (e.g., 02)
                const formattedNum = pageNum < 10 ? '0' + pageNum : pageNum;
                
                // Add the Header, Footer, and Content Container
                pageDiv.innerHTML = `
                    <div class="page-header">
                        <div class="header-text">RECOMMENDATIONS BY TTB</div>
                        <div class="header-divider"><div class="diamond"></div></div>
                        <div class="header-logo">
                            <img src="thailand-proposal/images/logo-icon.png" alt="Logo">
                        </div>
                    </div>
                    <div class="page-content guide-section"></div>
                    <div class="page-footer">
                        <div class="footer-text">TTB EXPERIENCES</div>
                        <div class="page-number">${formattedNum}</div>
                    </div>
                `;
                return pageDiv;
            }

            if (elements.length > 0) {
                let currentPageNum = 2; // Cover is page 1
                let currentPage = createNewPage(currentPageNum);
                container.appendChild(currentPage);
                
                let contentContainer = currentPage.querySelector('.page-content');

                // 3. Insert elements one by one and check vertical overflow
                for (let i = 0; i < elements.length; i++) {
                    const node = elements[i].cloneNode(true);
                    
                    // If it's an H2 (Main Title like "1. Points to Remember"), we optionally format it
                    if (node.nodeName && node.nodeName.toUpperCase() === 'H2') {
                        // Change "1. Points to Remember" into a subtitle format as well
                        const text = node.textContent.replace(/^\d+\.\s*/, '');
                        node.textContent = text;
                    }
                    
                    contentContainer.appendChild(node);

                    // Check if the page is overflowing vertically
                    if (contentContainer.scrollHeight > contentContainer.clientHeight) {
                        // It overflowed! Remove the node.
                        contentContainer.removeChild(node);
                        
                        // Create a new page
                        currentPageNum++;
                        currentPage = createNewPage(currentPageNum);
                        container.appendChild(currentPage);
                        contentContainer = currentPage.querySelector('.page-content');
                        
                        // Append the node to the new page
                        contentContainer.appendChild(node);
                    }
                }
            }
            
            // Remove the hidden container
            injected.innerHTML = '';
        });

        // Navigation for Desktop
        function scrollBook(direction) {
            const container = document.getElementById("bookContainer");
            const scrollAmount = container.clientWidth;
            container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
        }

        // PDF Export
        function printPDF() {
            window.print();
        }
    </script>
</body>
</html>
