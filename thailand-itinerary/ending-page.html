<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Thank you for choosing TTB Experiences for your Thailand Itinerary. Contact Sneha Dalvi for any queries.">
  <title>Thailand Itinerary — Thank You | TTB Experiences</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Vesper+Libre:wght@400;500;700;900&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Stylesheets (load order per Architecture Doc) -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/logo-badge.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- JavaScript -->
  <script src="js/main.js" defer></script>
</head>

<body class="page">

  <!-- Booklet-sized Background Wrapper -->
  <div class="page__wrapper" style="background-image: url('assets/images/ending_page_bg.png'); background-size: cover; background-position: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #4a3424; padding: 60px 20px;">

    <!-- Top Section -->
    <div style="margin-bottom: 20px;">
      <p style="font-family: var(--font-family-body); font-weight: var(--font-weight-bold); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase;">CURATED EXPERIENCES</p>
      
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; margin-bottom: 20px;">
        <hr style="width: 80px; border: 0; border-top: 1px solid #d3a479;">
        <span style="color: #d3a479; font-size: 1.2rem;">&#10086;</span>
        <hr style="width: 80px; border: 0; border-top: 1px solid #d3a479;">
      </div>

      <!-- TTB Logo Badge (Centered) -->
      <div class="logo-badge" role="img" aria-label="TTB Experiences logo" style="position: relative; margin: 0 auto; width: 100px; height: 100px;">
        <img class="logo-badge__img" src="assets/images/logo-icon.png" alt="TTB Experiences logo" width="85" height="85">
      </div>
    </div>

    <!-- Middle Section -->
    <div style="margin-bottom: 40px;">
      <h1 style="font-family: var(--font-family-heading); font-size: 2.5rem; font-weight: var(--font-weight-bold); text-transform: uppercase; margin-bottom: 10px;">THANK YOU</h1>
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <hr style="width: 60px; border: 0; border-top: 1px solid #d3a479;">
        <span style="color: #d3a479; font-size: 1.2rem;">&#10022;</span>
        <hr style="width: 60px; border: 0; border-top: 1px solid #d3a479;">
      </div>

      <p style="font-family: var(--font-family-body); font-size: 1.25rem; margin-bottom: 5px;">Curated by</p>
      <p style="font-family: var(--font-family-body); font-size: 1.5rem; font-weight: var(--font-weight-bold); margin-bottom: 5px;">TTB Experiences</p>
      <p style="font-family: var(--font-family-body); font-size: 1.25rem; font-style: italic; margin-bottom: 5px;">by</p>
      <p style="font-family: var(--font-family-body); font-size: 1.5rem; font-weight: var(--font-weight-bold); margin-bottom: 0;">Sneha Dalvi</p>
    </div>

    <!-- Stay Connected Section -->
    <div style="width: 100%; max-width: 420px; margin-bottom: 40px;">
      <h2 style="font-family: var(--font-family-body); font-size: 1.5rem; font-weight: var(--font-weight-bold); margin-bottom: 15px;">Stay Connected</h2>
      
      <!-- Contact Box -->
      <div style="border: 1px solid #4a3424; border-radius: 16px; padding: 25px; background-color: rgba(250, 245, 240, 0.6); text-align: left; backdrop-filter: blur(5px);">
        
        <!-- Row 1: Website -->
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px dashed #4a3424; padding-bottom: 20px;">
          <div style="width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid #4a3424; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <!-- Globe Icon SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a3424" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
          </div>
          <div>
            <p style="font-family: var(--font-family-body); font-weight: var(--font-weight-bold); font-size: 1.05rem; margin-bottom: 2px;">Website</p>
            <p style="font-family: var(--font-family-body); font-size: 1rem;">https://ttbexperiences.com/</p>
          </div>
        </div>

        <!-- Row 2: Email -->
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px dashed #4a3424; padding-bottom: 20px;">
          <div style="width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid #4a3424; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background-color: #4a3424;">
            <!-- Envelope Icon SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </div>
          <div>
            <p style="font-family: var(--font-family-body); font-weight: var(--font-weight-bold); font-size: 1.05rem; margin-bottom: 2px;">Email</p>
            <p style="font-family: var(--font-family-body); font-size: 1rem;">sneha@ttbexperiences.com</p>
          </div>
        </div>

        <!-- Row 3: Phone -->
        <div style="display: flex; align-items: center; gap: 20px;">
          <div style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #4a3424; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <!-- Phone Icon SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a3424" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
          </div>
          <div>
            <p style="font-family: var(--font-family-body); font-weight: var(--font-weight-bold); font-size: 1.05rem; margin-bottom: 2px;">Contact Number</p>
            <p style="font-family: var(--font-family-body); font-size: 1rem;">+91 9769294680</p>
          </div>
        </div>

      </div>
    </div>

    <!-- Bottom Section -->
    <div>
      <p style="font-family: var(--font-family-heading); font-size: 1.75rem; font-weight: var(--font-weight-bold); letter-spacing: 0.5px;">Handpicked . Handcrafted . Curated</p>
    </div>

  </div>

</body>

</html>
