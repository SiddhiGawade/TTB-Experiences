<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" id="meta-description" content="Thailand Itinerary">
  <title id="meta-title">Thailand Itinerary | Loading...</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Vesper+Libre:wght@400;500;700;900&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Stylesheets (load order per Architecture Doc) -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/page-header.css">
  <link rel="stylesheet" href="css/components/logo-badge.css">
  <link rel="stylesheet" href="css/components/day-section.css">
  <link rel="stylesheet" href="css/components/page-footer.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- JavaScript -->
  <script src="js/main.js" defer></script>
  <script src="js/data-loader.js" defer></script>
</head>

<body class="page">

  <!-- Skip to Content Link (accessible, hidden until focused) -->
  <a class="skip-link" href="#main-content" aria-label="Skip to main content">Skip to main content</a>

  <div class="page__wrapper">

    <!-- ===== HEADER ===== -->
    <header class="page-header">
      <p class="page-header__title" id="page-header-title"></p>
      <div class="page-header__divider"></div>

      <!-- TTB Logo Badge -->
      <div class="logo-badge" role="img" aria-label="TTB Experiences logo">
        <img class="logo-badge__img" src="assets/images/logo-icon.png" alt="TTB Experiences logo" width="85"
          height="85">
      </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="main-content" class="page__content">

      <!-- Main Day Heading -->
      <h1 class="day-heading" id="main-heading"></h1>

      <!-- Container for dynamic days -->
      <div id="days-container"></div>

      <!-- ===== DAY TEMPLATE ===== -->
      <template id="day-template">
        <section class="day-section" aria-labelledby="">
          
          <div class="day-section__image">
            <img class="day-section__img" src="" alt="" loading="lazy" width="" height="">
          </div>

          <div class="day-section__text">
            <h2 class="day-section__title"></h2>
            <div class="day-section__paragraphs"></div>
            <p class="day-section__callout"></p>
          </div>

        </section>
      </template>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="page-footer">
      <p class="page-footer__text" id="page-footer-text"></p>
    </footer>

  </div>

</body>

</html>
