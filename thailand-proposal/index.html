<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thailand Travel Proposal - 8 Nights / 7 Days itinerary for Mr. & Mrs. Sharma, curated by Sneha Dalvi. TTB Experiences.">
  <title>Thailand Travel Proposal | TTB Experiences</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="proposal-page" id="proposal-page">

    <!-- Background Watercolor Image -->
    <div class="proposal-page__background" aria-hidden="true">
      <img src="images/background.png" alt="" loading="eager">
    </div>

    <!-- Foreground Content -->
    <div class="proposal-content">

      <!-- Logo -->
      <div class="logo" id="logo" role="img" aria-label="TTB Experiences Logo">
        <!-- Curved "EXPERIENCES" text using SVG -->
        <div class="logo__curved-text-wrapper">
          <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Arc that curves along the bottom portion of the circle -->
              <path id="curve-bottom" d="M 15,95 A 62,62 0 0,1 125,95" fill="none" />
            </defs>
            <text>
              <textPath href="#curve-bottom" startOffset="50%" text-anchor="middle">
                E X P E R I E N C E S
              </textPath>
            </text>
          </svg>
        </div>

        <span class="logo__text-ttb">TTB</span>
        <img
          class="logo__icon"
          src="images/logo-icon.png"
          alt="Travel suitcase icon"
          width="60"
          height="60"
        >
      </div>

      <!-- Destination Heading -->
      <h1 class="heading-destination" id="heading-destination">
        Thailand
      </h1>

      <!-- Tagline -->
      <p class="tagline" id="tagline">
        Explore the Land of Smiles, Heritage &amp; Natural Beauty
      </p>

      <!-- Proposal Section -->
      <p class="proposal-label" id="proposal-label">
        Proposal For
      </p>
      <p class="client-name" id="client-name">
        MR. &amp; MRS. SHARMA (or the client's name)
      </p>

      <!-- Decorative Divider -->
      <div class="divider" id="divider" role="separator" aria-hidden="true">
        <hr class="divider__line">
        <span class="divider__star">✦</span>
        <hr class="divider__line">
      </div>

      <!-- Trip Duration -->
      <p class="trip-duration" id="trip-duration">
        8 Nights / 7 Days
      </p>

      <!-- Curator Credit -->
      <p class="curator" id="curator">
        Curator : Sneha Dalvi
      </p>

    </div>

  </main>

</body>
</html>
